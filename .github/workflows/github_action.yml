name: DNS Block&Redirect Configurer cron task

on:
  schedule:
    - cron: '30 1 * * *' # 04:30 MSK (01:30 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: DNS

    env:
      DNS: ${{ vars.DNS }}
      BLOCK: ${{ vars.BLOCK }}
      REDIRECT: ${{ vars.REDIRECT }}

      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      TZ: Europe/Moscow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Run application
        run: |
          echo "Starting application..."
          java --enable-preview -jar target/*.jar
      - name: Monthly Keep-alive commit
        if: github.event_name == 'schedule' && contains(github.event.schedule, '0 0 1 * *')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Chore: Monthly keep-alive to prevent workflow suspension"
          git push
